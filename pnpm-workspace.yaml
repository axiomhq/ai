packages:
  - packages/*
  - internal/*
  - examples/*

catalog:
  eslint: ^9.32.0
  prettier: ^3.5.3
  tsup: ^8.5.1
  typescript: ^5.8.3
  vite: ^7.3.2
  vite-plugin-dts: ^4.5.4
  vitest: ^4.0.0
  zod: 4.1.5

minimumReleaseAge: 10080
blockExoticSubdeps: true
onlyBuiltDependencies:
  - esbuild
  - msw
  - napi-postinstall
  - protobufjs
  - sharp
  - unrs-resolver
minimumReleaseAgeExclude:
  - "next@16.0.7"
